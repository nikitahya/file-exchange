<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Showcase Request | File-Exchange</title>
</head>
<body>
    <h1>File Showcase</h1>

    <p>Please send your response below.</p>

    <form action="{{ url_for('showcase.showcase_reply', token=token) }}" method="post" 
enctype="multipart/form-data">
        <textarea name="body_text" rows="5" cols="60" placeholder="Write your message..."></textarea>
        

        <input type="file" name="file">
        

        <button type="submit">Send response</button>
    </form>
</body>
</html>
